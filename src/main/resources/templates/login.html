<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #6f42c1, #f8f5ff);
            font-family: Arial, sans-serif;
        }

        .page-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(111, 66, 193, 0.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #6f42c1, #8e61e9);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .login-header h3 {
            margin: 0;
            font-weight: bold;
        }

        .login-body {
            padding: 25px;
        }

        .form-label {
            color: #4b2c91;
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #d9c8ff;
            padding: 10px;
        }

        .form-control:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.15);
        }

        .btn-purple {
            width: 100%;
            background-color: #6f42c1;
            border: none;
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-purple:hover {
            background-color: #5e35b1;
        }

        .info-text {
            font-size: 13px;
            color: #eee;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="login-card">

        <div class="login-header">
            <h3>Login System</h3>
            <div class="info-text">
                Isi bebas (username & password)
            </div>
        </div>

        <div class="login-body">

            <!-- Error -->
            <div th:if="${error}" class="alert alert-danger text-center">
                <span th:text="${error}"></span>
            </div>

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
                </div>

                <button type="submit" class="btn btn-purple">Login</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
